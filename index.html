<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Brandon · Notificaciones Nativas</title>
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="Chat con notificaciones nativas del sistema">
  
  <!-- Manifest para PWA (necesario para notificaciones en Android) -->
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22Brandon%20Chat%22,
    %22short_name%22:%22Brandon%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%23121212%22,
    %22theme_color%22:%22%23121212%22,
    %22icons%22:[{
      %22src%22:%22https://via.placeholder.com/192x192%22,
      %22sizes%22:%22192x192%22,
      %22type%22:%22image/png%22
    }]
  }">
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* === RESET + VARIABLES === */
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    html,body{height:100%;overflow:hidden;background:#121212;color:#e0e0e0}
    body{padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}
    :root{--input-bottom:0px;--safe-bottom:env(safe-area-inset-bottom,0px)}
    
    /* === CHAT === */
    .chat-container{width:100%;height:100%;display:flex;flex-direction:column;background:#121212}
    .chat-messages{flex:1;overflow-y:auto;padding:20px 15px 80px;padding-left:max(10px,env(safe-area-inset-left));padding-right:max(10px,env(safe-area-inset-right));display:flex;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
    .message{max-width:85%;min-width:40px;padding:8px 14px;border-radius:20px;line-height:1.4;opacity:0;animation:fadeIn .25s forwards;word-wrap:break-word;cursor:pointer;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,0.2)}
    @keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
    .message.sent{align-self:flex-end;border-bottom-right-radius:6px;color:#000;font-weight:500;background:linear-gradient(135deg, #FF6B6B, #FFA726)}
    .message.received{align-self:flex-start;border-bottom-left-radius:6px;color:#000;background:#f0f0f0}
    .message-text{font-size:16px;word-break:break-word}
    .message-reply-quoted{font-size:13px;padding:4px 8px;margin-bottom:5px;background:rgba(255,255,255,0.3);border-radius:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;color:#222}
    .message-edited{font-size:10px;text-align:right;opacity:0.7;margin-top:2px;font-style:italic}
    
    /* --- IMAGEN COMPLETA --- */
    .message-image-container{margin-top:6px;border-radius:16px;overflow:hidden;max-width:100%;background:#333; display:flex; justify-content:center}
    .message-image{width:auto; height:auto; max-width:100%; max-height:400px; object-fit:contain; display:block; background:#ddd; cursor:pointer; border-radius:12px;}
    
    .message-audio-container,.message-video-container{margin-top:6px;background:rgba(0,0,0,0.05);border-radius:16px;padding:8px}
    .message-audio{width:100%}
    .message-video{width:100%;max-height:280px;border-radius:12px}
    .pastel-color-1{background:#FFD1DC} .pastel-color-2{background:#B5EAD7} .pastel-color-3{background:#C7CEEA}
    .pastel-color-4{background:#FFDAC1} .pastel-color-5{background:#E2F0CB} .pastel-color-6{background:#D4F1F4}
    .pastel-color-7{background:#FFB7B2} .pastel-color-8{background:#D8BFD8} .pastel-color-9{background:#AFEEEE}
    .pastel-color-10{background:#F0E68C}

    /* === INPUT CON BOTONES === */
    .input-area{flex-shrink:0;padding:12px 15px max(16px,var(--safe-bottom));background:transparent;position:fixed;bottom:var(--input-bottom);left:0;right:0;z-index:1000}
    .input-with-buttons-wrapper{display:flex;align-items:center;background:rgba(45,45,45,0.7);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(10px);border-radius:30px;padding:4px 8px}
    .left-buttons-container{display:flex;align-items:center;gap:2px}
    .app-btn-inside{background:transparent;border:none;color:#ccc;width:40px;height:40px;font-size:20px;border-radius:50%;cursor:pointer;transition:.2s}
    .app-btn-inside:active{background:#444;transform:scale(.92)}
    .message-input-with-buttons{flex:1;background:transparent;border:none;padding:10px 8px;font-size:16px;color:#eee;outline:none;min-width:0}
    .message-input-with-buttons::placeholder{color:#777}

    /* === PREVIEW RESPUESTA === */
    .reply-preview{display:none;align-items:center;justify-content:space-between;background:#2a2a2a;padding:10px 18px;position:fixed;left:0;right:0;bottom:80px;z-index:1001;border-top:1px solid #3a3a3a}
    .reply-preview.active{display:flex}
    .reply-preview-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#ccc;font-style:italic}
    .reply-close-button{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer}

    /* === LOADING / CONEXIÓN === */
    .connection-status{display:none !important;}
    .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:15px;background:#121212}
    .loading-spinner{width:40px;height:40px;border:4px solid #2a2a2a;border-top-color:#4CAF50;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* === MODAL AUDIO === */
    .audio-recorder-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:3000;align-items:center;justify-content:center;padding:20px}
    .audio-recorder-container{background:#1e1e1e;border-radius:28px;padding:30px;width:90%;max-width:400px;text-align:center}
    .audio-wave{display:flex;align-items:flex-end;justify-content:center;height:100px;gap:3px;margin:20px 0}
    .audio-wave-bar{width:5px;background:#4CAF50;border-radius:3px;transition:height .1s}
    .audio-recorder-timer{font-size:48px;font-family:monospace;color:#4CAF50;margin:20px 0;font-weight:bold}
    .audio-controls{display:flex;justify-content:center;gap:15px;margin:20px 0;flex-wrap:wrap}
    .audio-btn{width:65px;height:65px;border-radius:50%;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
    .audio-btn.record{background:#f44336;color:#fff}
    .audio-btn.stop{background:#FFA726;color:#fff}
    .audio-btn.send{background:#4CAF50;color:#fff}
    .audio-btn.cancel{background:#555;color:#fff}
    .audio-btn:active{transform:scale(0.9)}
    .audio-btn:disabled{opacity:0.3;cursor:not-allowed}
    .permission-btn{background:#2196F3;color:#fff;border:none;padding:15px 30px;border-radius:40px;font-size:18px;cursor:pointer;margin:20px 0}

    /* === MODAL CÁMARA === */
    .camera-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:3000;align-items:center;justify-content:center}
    .camera-container{display:flex;flex-direction:column;height:100%;width:100%;max-width:500px;background:#000}
    .camera-preview{flex:1;position:relative;background:#111;display:flex;align-items:center;justify-content:center}
    #cameraVideoElement{width:100%;height:100%;object-fit:cover;display:none}
    .camera-preview-result{width:100%;height:100%;object-fit:contain;display:none;background:#000}
    .camera-placeholder{position:absolute;color:#ccc;text-align:center}
    .camera-switch-btn{position:absolute;top:20px;right:20px;background:#333;color:white;border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;z-index:10}
    .camera-flash-btn{position:absolute;top:80px;right:20px;background:#333;color:white;border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;z-index:10}
    .camera-flash-btn.active{background:#FFD700;color:#000}
    .camera-buttons{display:flex;justify-content:center;gap:15px;padding:20px;background:rgba(0,0,0,0.8)}
    .camera-btn{padding:12px 25px;border:none;border-radius:30px;font-weight:bold;display:flex;align-items:center;gap:8px;cursor:pointer}
    .primary{background:#4CAF50;color:#fff}
    .danger{background:#f44336;color:#fff}
    .secondary{background:#2196F3;color:#fff}

    /* === MODAL IMAGEN === */
    .image-modal{display:none;position:fixed;left:20px;right:20px;bottom:100px;background:#1e1e1e;border-radius:20px;padding:15px;z-index:2500}
    .modal-header{display:flex;justify-content:space-between;color:#fff;margin-bottom:10px}
    .preview-image{width:100%;max-height:250px;object-fit:contain;background:#000;border-radius:12px;margin-bottom:10px}
    .modal-footer{display:flex;gap:10px}
    .caption-input{flex:1;padding:10px;border-radius:20px;border:none;background:#333;color:#fff}
    .send-image-btn{background:#4CAF50;color:#fff;border:none;padding:10px 20px;border-radius:20px}

    /* === UPLOAD OVERLAY === */
    .upload-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:3500}
    .upload-progress{background:#222;padding:30px;border-radius:20px;text-align:center}
    .progress-bar{width:200px;height:10px;background:#333;border-radius:10px;margin:15px 0}
    .progress-fill{height:100%;background:#4CAF50;border-radius:10px;width:0%}

    /* === BOTÓN DE PERMISO DE NOTIFICACIONES === */
    .notification-permission-container{position:fixed;top:10px;right:10px;z-index:2000;display:flex;flex-direction:column;gap:5px}
    .notification-permission-btn{background:#2196F3;color:white;border:none;border-radius:30px;padding:10px 20px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
    .notification-permission-btn.granted{background:#4CAF50}
    .notification-permission-btn.denied{background:#f44336}
    .test-notification-btn{background:#FFA726;color:white;border:none;border-radius:30px;padding:8px 16px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
  </style>
</head>
<body>
  <div id="connectionStatus" class="connection-status"><span id="connectionIcon">⚫</span><span id="connectionText">Conectando...</span></div>

  <!-- Contenedor de botones de notificaciones -->
  <div class="notification-permission-container">
    <button id="requestNotificationPermission" class="notification-permission-btn">
      <i class="fas fa-bell"></i> Activar notificaciones
    </button>
    <button id="testNotificationBtn" class="test-notification-btn" style="display:none">
      <i class="fas fa-flask"></i> Probar notificación
    </button>
  </div>

  <div class="chat-container">
    <div class="chat-messages" id="chatMessages">
      <div class="loading-state" id="loadingState">
        <div class="loading-spinner"></div>
        <p style="color:#888">Cargando mensajes...</p>
      </div>
    </div>

    <div class="reply-preview" id="replyPreview">
      <span class="reply-preview-text" id="replyPreviewText"></span>
      <button class="reply-close-button" id="closeReplyBtn">✕</button>
    </div>

    <form class="input-area" id="messageForm">
      <div class="input-with-buttons-wrapper">
        <div class="left-buttons-container">
          <button type="button" class="app-btn-inside" id="micBtn" title="Grabar audio">🎤</button>
          <button type="button" class="app-btn-inside" id="cameraBtn" title="Cámara">📷</button>
          <button type="button" class="app-btn-inside" id="galleryBtn" title="Galería">📁</button>
        </div>
        <input type="text" class="message-input-with-buttons" id="messageInput" placeholder="Mensaje" autocomplete="off">
      </div>
    </form>
  </div>

  <!-- Audio recorder overlay -->
  <div id="audioRecorderOverlay" class="audio-recorder-overlay">
    <div class="audio-recorder-container">
      <h2 style="color:#fff; margin-bottom:10px">🎤 Grabar audio</h2>
      <div class="audio-wave" id="audioWave"></div>
      <div class="audio-recorder-timer" id="audioTimer">00:00</div>
      
      <div id="audioPermissionSection">
        <button class="permission-btn" id="requestMicPermissionBtn">🎤 Permitir micrófono</button>
      </div>
      
      <div id="audioRecordingControls" style="display:none">
        <div class="audio-controls">
          <button class="audio-btn record" id="startRecordBtn" title="Grabar">⏺️</button>
          <button class="audio-btn stop" id="stopRecordBtn" disabled title="Detener">⏹️</button>
          <button class="audio-btn send" id="sendAudioBtn" disabled title="Enviar">📤</button>
          <button class="audio-btn cancel" id="cancelAudioBtn" title="Cancelar">✕</button>
        </div>
        <p style="color:#aaa; margin-top:15px; font-size:14px" id="audioStatusText">Presiona grabar para comenzar</p>
      </div>
    </div>
  </div>

  <!-- Cámara overlay -->
  <div id="cameraOverlay" class="camera-overlay">
    <div class="camera-container">
      <div class="camera-preview">
        <video id="cameraVideoElement" autoplay playsinline></video>
        <canvas id="cameraCanvas" style="display:none"></canvas>
        <img id="cameraPreviewResult" class="camera-preview-result" alt="preview">
        <div class="camera-placeholder" id="cameraPlaceholder"><i class="fas fa-camera" style="font-size:40px"></i><p>Iniciando cámara...</p></div>
        <button class="camera-switch-btn" id="cameraSwitchBtn" title="Cambiar cámara"><i class="fas fa-sync-alt"></i></button>
        <button class="camera-flash-btn" id="cameraFlashBtn" title="Flash"><i class="fas fa-bolt"></i></button>
      </div>
      <div class="camera-buttons">
        <button class="camera-btn primary" id="captureBtn"><i class="fas fa-camera"></i> Tomar foto</button>
        <button class="camera-btn secondary" id="retakeBtn" style="display:none"><i class="fas fa-redo"></i> Repetir</button>
        <button class="camera-btn primary" id="sendMediaBtn" style="display:none"><i class="fas fa-cloud-upload-alt"></i> Enviar</button>
        <button class="camera-btn danger" id="closeCameraBtn"><i class="fas fa-times"></i> Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Input file oculto y modal imagen -->
  <input type="file" id="realFileInput" accept="image/*" style="display:none">
  <div id="imagePreviewModal" class="image-modal">
    <div class="modal-header"><strong>📷 Previsualización</strong><button id="cancelImageBtn" style="background:none;border:none;color:#fff;font-size:22px">✕</button></div>
    <img id="preview" class="preview-image">
    <div class="modal-footer"><input id="imageCaption" class="caption-input" placeholder="Descripción..."><button id="sendImageBtn" class="send-image-btn">Enviar</button></div>
  </div>

  <div id="uploadOverlay" class="upload-overlay"><div class="upload-progress"><div class="progress-bar"><div id="uploadBar" class="progress-fill"></div></div><div id="uploadPercentage">0%</div></div></div>
  <div id="notification" class="notification"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <!-- Service Worker para notificaciones push (necesario para Android) -->
  <script>
    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('Service Worker registration failed:', err));
    }

    // Crear Service Worker básico si no existe
    if (!navigator.serviceWorker.controller) {
      const swScript = `
        self.addEventListener('push', function(event) {
          const data = event.data.json();
          const options = {
            body: data.body,
            icon: data.icon || 'https://via.placeholder.com/192x192',
            badge: 'https://via.placeholder.com/192x192',
            vibrate: [200, 100, 200],
            data: data.data,
            actions: data.actions || [],
            requireInteraction: data.requireInteraction || false,
            silent: data.silent || false,
            tag: data.tag || 'default'
          };
          
          event.waitUntil(
            self.registration.showNotification(data.title, options)
          );
        });
        
        self.addEventListener('notificationclick', function(event) {
          event.notification.close();
          
          if (event.action) {
            // Manejar acciones de la notificación
            console.log('Action clicked:', event.action);
          }
          
          // Enfocar o abrir la ventana
          event.waitUntil(
            clients.matchAll({type: 'window', includeUncontrolled: true}).then(function(clientList) {
              if (clientList.length > 0) {
                return clientList[0].focus();
              }
              return clients.openWindow('/');
            })
          );
        });
      `;
      
      // Guardar service worker
      const blob = new Blob([swScript], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(err => console.log('SW registration failed:', err));
    }
  </script>

  <script>
    (function() {
      // ==================== CONFIGURACIÓN FIREBASE ====================
      const firebaseConfig = {
        apiKey: "AIzaSyCx75EIrWrRym40d3Ntjy8d_PjDy5V5Gp8",
        authDomain: "chat-online-f6753.firebaseapp.com",
        databaseURL: "https://chat-online-f6753-default-rtdb.firebaseio.com",
        projectId: "chat-online-f6753",
        storageBucket: "chat-online-f6753.appspot.com",
        messagingSenderId: "106228514889",
        appId: "1:106228514889:web:9dcfe5153d63eb55325a0c"
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const database = firebase.database();
      const messagesRef = database.ref('brandon-chat/messages');
      const connectedRef = database.ref('.info/connected');

      // ==================== ESTADO GLOBAL ====================
      const chatMessages = document.getElementById('chatMessages');
      const messageInput = document.getElementById('messageInput');
      const loadingState = document.getElementById('loadingState');
      const replyPreview = document.getElementById('replyPreview');
      const replyText = document.getElementById('replyPreviewText');
      
      let user = (() => {
        try {
          const saved = localStorage.getItem('brandon-user');
          if (saved) return JSON.parse(saved);
        } catch(e) {}
        return {
          id: 'user_' + Math.random().toString(36).substring(2, 15) + Date.now(),
          colorIndex: Math.floor(Math.random() * 10),
          created: Date.now()
        };
      })();
      localStorage.setItem('brandon-user', JSON.stringify(user));

      const displayedIds = new Set();
      let shouldScroll = true;
      let userScrolling = false;
      let replyingTo = null;
      let editingId = null;

      // ==================== SISTEMA DE NOTIFICACIONES NATIVAS DEL SISTEMA ====================
      
      const notificationBtn = document.getElementById('requestNotificationPermission');
      const testNotificationBtn = document.getElementById('testNotificationBtn');
      let notificationPermission = localStorage.getItem('notificationPermission') || 'default';
      
      // Verificar soporte de notificaciones
      function checkNotificationSupport() {
        if (!('Notification' in window)) {
          console.warn('Este navegador no soporta notificaciones');
          notificationBtn.style.display = 'none';
          return false;
        }
        return true;
      }

      // Actualizar UI del botón según permiso
      function updateNotificationButton() {
        if (!checkNotificationSupport()) return;
        
        if (Notification.permission === 'granted') {
          notificationBtn.innerHTML = '<i class="fas fa-bell"></i> Notificaciones activadas';
          notificationBtn.classList.add('granted');
          notificationBtn.classList.remove('denied');
          testNotificationBtn.style.display = 'flex';
        } else if (Notification.permission === 'denied') {
          notificationBtn.innerHTML = '<i class="fas fa-bell-slash"></i> Notificaciones bloqueadas';
          notificationBtn.classList.add('denied');
          notificationBtn.classList.remove('granted');
          testNotificationBtn.style.display = 'none';
        } else {
          notificationBtn.innerHTML = '<i class="fas fa-bell"></i> Activar notificaciones';
          notificationBtn.classList.remove('granted', 'denied');
          testNotificationBtn.style.display = 'none';
        }
      }

      // Solicitar permiso de notificaciones
      notificationBtn.addEventListener('click', async () => {
        if (!checkNotificationSupport()) {
          alert('Tu navegador no soporta notificaciones');
          return;
        }

        try {
          const permission = await Notification.requestPermission();
          notificationPermission = permission;
          localStorage.setItem('notificationPermission', permission);
          updateNotificationButton();
          
          if (permission === 'granted') {
            // Mostrar notificación de prueba nativa
            showNativeNotification(
              '✅ Notificaciones activadas',
              'Ahora recibirás notificaciones en tu bandeja del sistema',
              'notifications-activated'
            );
          }
        } catch (error) {
          console.error('Error al solicitar permiso:', error);
        }
      });

      // Botón de prueba de notificaciones
      testNotificationBtn.addEventListener('click', () => {
        showNativeNotification(
          '🔔 Notificación de prueba',
          'Esta es una notificación nativa del sistema',
          'test-notification',
          [
            { action: 'ok', title: 'Ver chat' },
            { action: 'close', title: 'Cerrar' }
          ]
        );
      });

      // Función principal para mostrar notificaciones nativas
      function showNativeNotification(title, body, tag = 'default', actions = [], requireInteraction = false, silent = false) {
        // Verificar soporte y permisos
        if (!('Notification' in window)) {
          console.log('Notificaciones no soportadas');
          return false;
        }

        if (Notification.permission !== 'granted') {
          console.log('Permiso de notificaciones no concedido');
          return false;
        }

        // Configuración de la notificación
        const options = {
          body: body,
          icon: 'https://via.placeholder.com/192x192?text=💬', // Icono para la notificación
          badge: 'https://via.placeholder.com/192x192?text=💬', // Badge para dispositivos móviles
          vibrate: [200, 100, 200], // Patrón de vibración (solo móviles)
          tag: tag, // Tag para agrupar notificaciones
          renotify: true, // Notificar incluso si hay otra con el mismo tag
          requireInteraction: requireInteraction, // No desaparecer automáticamente
          silent: silent, // Sin sonido
          timestamp: Date.now(), // Timestamp para ordenar
          data: {
            dateOfArrival: Date.now(),
            primaryKey: 1
          }
        };

        // Agregar acciones si se proporcionan (solo soportado en algunos navegadores)
        if (actions.length > 0 && 'actions' in Notification.prototype) {
          options.actions = actions;
        }

        try {
          // Crear y mostrar la notificación
          const notification = new Notification(title, options);

          // Manejar clic en la notificación
          notification.onclick = function(event) {
            event.preventDefault();
            window.focus();
            this.close();
            
            // Aquí puedes agregar navegación específica
            console.log('Notificación clickeada:', tag);
          };

          // Manejar cierre de la notificación
          notification.onclose = function() {
            console.log('Notificación cerrada:', tag);
          };

          // Manejar error
          notification.onerror = function(error) {
            console.error('Error en notificación:', error);
          };

          return true;
        } catch (error) {
          console.error('Error al mostrar notificación:', error);
          return false;
        }
      }

      // Actualizar estado inicial
      updateNotificationButton();

      // ==================== NOTIFICACIONES DE EVENTOS ====================
      
      // Notificación de conexión
      connectedRef.on('value', (snap) => {
        const statusEl = document.getElementById('connectionStatus');
        if (snap.val()) {
          statusEl.className = 'connection-status connected';
          statusEl.innerHTML = '<span>✅</span><span>Conectado</span>';
          statusEl.style.display = 'flex';
          
          showNativeNotification(
            '✅ Conectado al chat',
            'La conexión se ha establecido correctamente',
            'connection-success'
          );
          
          setTimeout(() => statusEl.style.display = 'none', 3000);
        } else {
          statusEl.className = 'connection-status disconnected';
          statusEl.innerHTML = '<span>🔴</span><span>Sin conexión</span>';
          statusEl.style.display = 'flex';
          
          showNativeNotification(
            '🔴 Sin conexión',
            'Esperando reconexión...',
            'connection-error',
            [],
            true // Requiere interacción
          );
        }
      });

      // Notificación de nuevos mensajes (solo si no es el usuario actual)
      messagesRef.on('child_added', (snap) => {
        const msg = snap.val();
        if (!displayedIds.has(snap.key) && msg.userId !== user.id) {
          // Preparar contenido del mensaje
          let content = '';
          let title = '💬 Nuevo mensaje';
          let emoji = '💬';
          
          if (msg.text) {
            content = msg.text.substring(0, 100) + (msg.text.length > 100 ? '...' : '');
          } else if (msg.imageUrl) {
            content = '📷 Imagen';
            emoji = '📷';
            title = '📷 Nueva imagen';
          } else if (msg.audioUrl) {
            content = '🎤 Audio';
            emoji = '🎤';
            title = '🎤 Nuevo audio';
          } else if (msg.videoUrl) {
            content = '🎥 Video';
            emoji = '🎥';
            title = '🎥 Nuevo video';
          }
          
          // Mostrar notificación nativa
          showNativeNotification(
            title,
            content,
            'new-message-' + snap.key,
            [
              { action: 'reply', title: 'Responder' },
              { action: 'open', title: 'Abrir chat' }
            ]
          );
        }
        
        if (!displayedIds.has(snap.key)) handleNewMessage(snap.key, snap.val());
      });

      // Notificación de mensaje editado
      messagesRef.on('child_changed', (snap) => {
        const msg = snap.val();
        if (msg.userId !== user.id) {
          showNativeNotification(
            '✏️ Mensaje editado',
            'Un mensaje ha sido modificado',
            'edited-' + snap.key
          );
        }
        handleUpdateMessage(snap.key, snap.val());
      });

      // Notificación de mensaje eliminado
      messagesRef.on('child_removed', (snap) => {
        showNativeNotification(
          '🗑️ Mensaje eliminado',
          'Un mensaje ha sido eliminado',
          'removed-' + snap.key
        );
        removeMessage(snap.key);
      });

      // ==================== FUNCIÓN PARA CREAR ELEMENTO DE MENSAJE ====================
      function createMessageElement(id, msg) {
        const div = document.createElement('div');
        div.className = 'message';
        div.id = 'msg-' + id;
        div.dataset.id = id;
        div.dataset.userId = msg.userId || '';

        if (msg.replyTo && msg.replyTo.text) {
          const replyDiv = document.createElement('div');
          replyDiv.className = 'message-reply-quoted';
          replyDiv.textContent = msg.replyTo.text.slice(0, 100) + (msg.replyTo.text.length > 100 ? '…' : '');
          replyDiv.addEventListener('click', (e) => {
            e.stopPropagation();
            scrollToMessage(msg.replyTo.id);
          });
          div.appendChild(replyDiv);
        }

        if (msg.text && msg.text.trim() !== '' && 
            !msg.text.includes('📷') && !msg.text.includes('🎤') && !msg.text.includes('🎥')) {
          const textDiv = document.createElement('div');
          textDiv.className = 'message-text';
          textDiv.textContent = msg.text;
          div.appendChild(textDiv);
        }

        if (msg.imageUrl) {
          const imgContainer = document.createElement('div');
          imgContainer.className = 'message-image-container';
          const img = document.createElement('img');
          img.className = 'message-image';
          img.src = msg.imageUrl;
          img.loading = 'lazy';
          img.addEventListener('click', () => window.open(msg.imageUrl, '_blank'));
          imgContainer.appendChild(img);
          div.appendChild(imgContainer);
        }

        if (msg.audioUrl) {
          const audioContainer = document.createElement('div');
          audioContainer.className = 'message-audio-container';
          const audio = document.createElement('audio');
          audio.src = msg.audioUrl;
          audio.controls = true;
          audio.preload = 'metadata';
          audioContainer.appendChild(audio);
          div.appendChild(audioContainer);
        }

        if (msg.videoUrl) {
          const videoContainer = document.createElement('div');
          videoContainer.className = 'message-video-container';
          const video = document.createElement('video');
          video.src = msg.videoUrl;
          video.controls = true;
          video.playsInline = true;
          video.className = 'message-video';
          videoContainer.appendChild(video);
          div.appendChild(videoContainer);
        }

        if (msg.edited) {
          const edited = document.createElement('div');
          edited.className = 'message-edited';
          edited.textContent = 'editado';
          div.appendChild(edited);
        }

        if (msg.userId === user.id) {
          div.classList.add('sent');
          const colors = [
            ['#FF6B6B', '#FFA726'], ['#42A5F5', '#66BB6A'], ['#AB47BC', '#EC407A'],
            ['#FFCA28', '#FFA726'], ['#5C6BC0', '#26C6DA'], ['#26A69A', '#66BB6A']
          ];
          const idx = (msg.timestamp ? Math.floor(msg.timestamp / 1000) : Date.now()) % colors.length;
          div.style.background = `linear-gradient(135deg, ${colors[idx][0]}, ${colors[idx][1]})`;
        } else {
          div.classList.add('received');
          const pastelClasses = [
            'pastel-color-1', 'pastel-color-2', 'pastel-color-3', 'pastel-color-4',
            'pastel-color-5', 'pastel-color-6', 'pastel-color-7', 'pastel-color-8',
            'pastel-color-9', 'pastel-color-10'
          ];
          const idx = msg.userId ? Math.abs(msg.userId.split('').reduce((a,c) => a + c.charCodeAt(0), 0)) % 10 : 0;
          div.classList.add(pastelClasses[idx]);
        }

        div.addEventListener('click', () => {
          replyingTo = { id, text: msg.text || '' };
          replyText.textContent = (msg.text || '').slice(0, 140) + ((msg.text || '').length > 140 ? '…' : '');
          replyPreview.classList.add('active');
          messageInput.focus();
        });

        if (msg.userId === user.id) {
          let timer;
          div.addEventListener('touchstart', (e) => {
            e.preventDefault();
            timer = setTimeout(() => startEdit(id, msg.text || '', div), 600);
          }, { passive: false });
          div.addEventListener('touchend', () => clearTimeout(timer));
          div.addEventListener('touchcancel', () => clearTimeout(timer));
          div.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            startEdit(id, msg.text || '', div);
          });
        }

        return div;
      }

      function startEdit(id, text, element) {
        editingId = id;
        if (element) element.classList.add('editing');
        messageInput.value = text || '';
        messageInput.placeholder = 'Editando mensaje...';
        messageInput.focus();
        messageInput.select();
      }

      function scrollToMessage(id) {
        const el = document.getElementById('msg-' + id);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          el.style.boxShadow = '0 0 0 3px #4CAF50';
          setTimeout(() => el.style.boxShadow = '', 1500);
        }
      }

      function smoothScroll() {
        if (shouldScroll && !userScrolling) {
          setTimeout(() => {
            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
          }, 100);
        }
      }

      function handleNewMessage(id, msg) {
        if (!id || !msg || displayedIds.has(id)) return;
        displayedIds.add(id);
        const el = createMessageElement(id, msg);
        chatMessages.appendChild(el);
        smoothScroll();
      }

      function handleUpdateMessage(id, data) {
        const el = document.getElementById('msg-' + id);
        if (!el) return;
        const textDiv = el.querySelector('.message-text');
        if (textDiv && data.text !== undefined) textDiv.textContent = data.text;
        if (data.edited && !el.querySelector('.message-edited')) {
          const edited = document.createElement('div');
          edited.className = 'message-edited';
          edited.textContent = 'editado';
          el.appendChild(edited);
        }
      }

      function removeMessage(id) {
        const el = document.getElementById('msg-' + id);
        if (el) el.remove();
        displayedIds.delete(id);
      }

      // Cargar mensajes iniciales
      messagesRef.once('value', (snap) => {
        const msgs = [];
        snap.forEach(child => msgs.push({ id: child.key, ...child.val() }));
        msgs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        msgs.forEach(m => handleNewMessage(m.id, m));
        if (loadingState) loadingState.style.display = 'none';
        smoothScroll();
        
        // Notificación de bienvenida (solo si hay permisos)
        setTimeout(() => {
          if (Notification.permission === 'granted') {
            showNativeNotification(
              '👋 ¡Bienvenido a Brandon Chat!',
              `Has cargado ${msgs.length} mensajes`,
              'welcome'
            );
          }
        }, 1500);
      }).catch(console.error);

      // Envío de mensajes
      document.getElementById('messageForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (!text) return;
        
        if (editingId) {
          messagesRef.child(editingId).update({
            text: text,
            edited: true,
            updatedAt: firebase.database.ServerValue.TIMESTAMP
          }).then(() => {
            editingId = null;
            messageInput.value = '';
            messageInput.placeholder = 'Mensaje...';
            
            showNativeNotification(
              '✏️ Mensaje editado',
              'Tu mensaje se ha editado correctamente',
              'edit-success'
            );
          }).catch((error) => {
            console.error(error);
            showNativeNotification(
              '❌ Error',
              'No se pudo editar el mensaje',
              'error'
            );
          });
          return;
        }
        
        const payload = {
          text: text,
          userId: user.id,
          userData: { colorIndex: user.colorIndex },
          timestamp: firebase.database.ServerValue.TIMESTAMP,
          replyTo: replyingTo
        };
        
        messagesRef.push(payload).then(() => {
          messageInput.value = '';
          if (replyingTo) {
            replyingTo = null;
            replyPreview.classList.remove('active');
          }
          
          showNativeNotification(
            '✅ Mensaje enviado',
            'Tu mensaje se ha enviado correctamente',
            'send-success'
          );
        }).catch((error) => {
          console.error(error);
          showNativeNotification(
            '❌ Error',
            'No se pudo enviar el mensaje',
            'error'
          );
        });
      });

      // ==================== AUDIO ====================
      const audio = { 
        stream: null, 
        recorder: null, 
        chunks: [], 
        blob: null,
        isRecording: false,
        seconds: 0,
        timerInterval: null
      };
      
      const aOverlay = document.getElementById('audioRecorderOverlay');
      const permissionSection = document.getElementById('audioPermissionSection');
      const recordingControls = document.getElementById('audioRecordingControls');
      const startBtn = document.getElementById('startRecordBtn');
      const stopBtn = document.getElementById('stopRecordBtn');
      const sendBtn = document.getElementById('sendAudioBtn');
      const cancelBtn = document.getElementById('cancelAudioBtn');
      const audioTimer = document.getElementById('audioTimer');
      const audioWave = document.getElementById('audioWave');
      const audioStatus = document.getElementById('audioStatusText');

      function initAudioWave() {
        audioWave.innerHTML = '';
        for (let i = 0; i < 40; i++) {
          const bar = document.createElement('div');
          bar.className = 'audio-wave-bar';
          bar.style.height = '3px';
          audioWave.appendChild(bar);
        }
      }
      initAudioWave();

      function startWaveAnimation() {
        if (audio.waveInterval) clearInterval(audio.waveInterval);
        audio.waveInterval = setInterval(() => {
          const bars = audioWave.querySelectorAll('.audio-wave-bar');
          bars.forEach(bar => {
            const height = Math.floor(Math.random() * 60) + 5;
            bar.style.height = height + 'px';
          });
        }, 150);
      }

      function stopWaveAnimation() {
        if (audio.waveInterval) {
          clearInterval(audio.waveInterval);
          audio.waveInterval = null;
        }
        const bars = audioWave.querySelectorAll('.audio-wave-bar');
        bars.forEach(bar => bar.style.height = '3px');
      }

      function updateTimer() {
        const mins = Math.floor(audio.seconds / 60).toString().padStart(2, '0');
        const secs = (audio.seconds % 60).toString().padStart(2, '0');
        audioTimer.textContent = `${mins}:${secs}`;
      }

      function startTimer() {
        if (audio.timerInterval) clearInterval(audio.timerInterval);
        audio.timerInterval = setInterval(() => {
          if (audio.isRecording) {
            audio.seconds++;
            updateTimer();
          }
        }, 1000);
      }

      function stopTimer() {
        if (audio.timerInterval) {
          clearInterval(audio.timerInterval);
          audio.timerInterval = null;
        }
      }

      function resetAudioState() {
        audio.isRecording = false;
        audio.seconds = 0;
        updateTimer();
        stopWaveAnimation();
        stopTimer();
        startBtn.disabled = false;
        stopBtn.disabled = true;
        sendBtn.disabled = true;
        audioStatus.textContent = 'Presiona grabar para comenzar';
      }

      document.getElementById('requestMicPermissionBtn').addEventListener('click', async () => {
        try {
          audio.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          permissionSection.style.display = 'none';
          recordingControls.style.display = 'block';
          audioStatus.textContent = 'Listo para grabar';
          
          showNativeNotification(
            '🎤 Micrófono listo',
            'Puedes comenzar a grabar audio',
            'mic-ready'
          );
        } catch (e) {
          alert('Permiso de micrófono denegado');
          showNativeNotification(
            '❌ Error',
            'Permiso de micrófono denegado',
            'mic-error'
          );
          aOverlay.style.display = 'none';
          document.body.style.overflow = '';
        }
      });

      document.getElementById('micBtn').addEventListener('click', () => {
        aOverlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        resetAudioState();
        if (audio.stream) {
          permissionSection.style.display = 'none';
          recordingControls.style.display = 'block';
        } else {
          permissionSection.style.display = 'block';
          recordingControls.style.display = 'none';
        }
      });

      startBtn.addEventListener('click', () => {
        if (!audio.stream) return;
        
        audio.chunks = [];
        audio.recorder = new MediaRecorder(audio.stream);
        
        audio.recorder.ondataavailable = (e) => {
          if (e.data.size > 0) audio.chunks.push(e.data);
        };
        
        audio.recorder.onstop = () => {
          audio.blob = new Blob(audio.chunks, { type: 'audio/webm' });
          sendBtn.disabled = false;
          audioStatus.textContent = 'Grabación lista para enviar';
          stopWaveAnimation();
        };
        
        audio.recorder.start(1000);
        audio.isRecording = true;
        audio.seconds = 0;
        updateTimer();
        startTimer();
        startWaveAnimation();
        
        startBtn.disabled = true;
        stopBtn.disabled = false;
        sendBtn.disabled = true;
        audioStatus.textContent = 'Grabando...';
      });

      stopBtn.addEventListener('click', () => {
        if (audio.recorder && audio.recorder.state !== 'inactive') {
          audio.recorder.stop();
          audio.isRecording = false;
          stopTimer();
          stopBtn.disabled = true;
          audioStatus.textContent = 'Grabación finalizada';
        }
      });

      cancelBtn.addEventListener('click', () => {
        if (audio.recorder && audio.recorder.state !== 'inactive') {
          audio.recorder.stop();
        }
        if (audio.stream) {
          audio.stream.getTracks().forEach(t => t.stop());
          audio.stream = null;
        }
        aOverlay.style.display = 'none';
        document.body.style.overflow = '';
        resetAudioState();
      });

      sendBtn.addEventListener('click', async () => {
        if (!audio.blob) return;
        showUploadOverlay();
        try {
          const url = await uploadToCloudinary(audio.blob, 'audio');
          const payload = {
            audioUrl: url,
            userId: user.id,
            userData: { colorIndex: user.colorIndex },
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            replyTo: replyingTo
          };
          await messagesRef.push(payload);
          aOverlay.style.display = 'none';
          document.body.style.overflow = '';
          if (replyingTo) {
            replyingTo = null;
            replyPreview.classList.remove('active');
          }
          
          showNativeNotification(
            '🎤 Audio enviado',
            'Tu mensaje de audio se ha enviado correctamente',
            'audio-success'
          );
        } catch (e) {
          alert('Error al enviar audio');
          showNativeNotification(
            '❌ Error',
            'No se pudo enviar el audio',
            'audio-error'
          );
        } finally {
          hideUploadOverlay();
          if (audio.stream) {
            audio.stream.getTracks().forEach(t => t.stop());
            audio.stream = null;
          }
          resetAudioState();
        }
      });

      // ==================== CÁMARA (SOLO FOTO) ====================
      const cam = { stream: null, isFront: false, flash: false, blob: null };
      const cOverlay = document.getElementById('cameraOverlay');
      
      document.getElementById('cameraBtn').addEventListener('click', () => {
        cOverlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        startCamera();
      });

      async function startCamera() {
        try {
          if (cam.stream) cam.stream.getTracks().forEach(t => t.stop());
          cam.stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: cam.isFront ? 'user' : 'environment' }
          });
          const video = document.getElementById('cameraVideoElement');
          video.srcObject = cam.stream;
          video.style.display = 'block';
          video.style.transform = cam.isFront ? 'scaleX(-1)' : 'scaleX(1)';
          document.getElementById('cameraPlaceholder').style.display = 'none';
        } catch (e) {
          document.getElementById('cameraPlaceholder').innerHTML = '<p>Error al acceder a la cámara</p><button onclick="startCamera()">Reintentar</button>';
          showNativeNotification(
            '❌ Error',
            'No se pudo acceder a la cámara',
            'camera-error'
          );
        }
      }

      document.getElementById('cameraSwitchBtn').addEventListener('click', () => {
        cam.isFront = !cam.isFront;
        startCamera();
      });

      document.getElementById('cameraFlashBtn').addEventListener('click', () => {
        cam.flash = !cam.flash;
        try {
          const track = cam.stream.getVideoTracks()[0];
          if (track && track.applyConstraints) {
            track.applyConstraints({ advanced: [{ torch: cam.flash }] });
          }
        } catch(e) {}
        document.getElementById('cameraFlashBtn').classList.toggle('active', cam.flash);
      });

      document.getElementById('captureBtn').addEventListener('click', () => {
        const video = document.getElementById('cameraVideoElement');
        const canvas = document.getElementById('cameraCanvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        if (cam.isFront) {
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
        }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
          cam.blob = blob;
          const url = URL.createObjectURL(blob);
          document.getElementById('cameraPreviewResult').src = url;
          document.getElementById('cameraPreviewResult').style.display = 'block';
          video.style.display = 'none';
          document.getElementById('retakeBtn').style.display = 'flex';
          document.getElementById('sendMediaBtn').style.display = 'flex';
          document.getElementById('captureBtn').style.display = 'none';
        }, 'image/jpeg', 0.9);
      });

      document.getElementById('retakeBtn').addEventListener('click', () => {
        cam.blob = null;
        document.getElementById('cameraPreviewResult').style.display = 'none';
        document.getElementById('cameraVideoElement').style.display = 'block';
        document.getElementById('retakeBtn').style.display = 'none';
        document.getElementById('sendMediaBtn').style.display = 'none';
        document.getElementById('captureBtn').style.display = 'flex';
      });

      document.getElementById('sendMediaBtn').addEventListener('click', async () => {
        if (!cam.blob) return;
        showUploadOverlay();
        try {
          const url = await uploadToCloudinary(cam.blob, 'image');
          const payload = {
            imageUrl: url,
            userId: user.id,
            userData: { colorIndex: user.colorIndex },
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            replyTo: replyingTo
          };
          await messagesRef.push(payload);
          cOverlay.style.display = 'none';
          document.body.style.overflow = '';
          if (replyingTo) {
            replyingTo = null;
            replyPreview.classList.remove('active');
          }
          
          showNativeNotification(
            '📷 Foto enviada',
            'Tu imagen se ha enviado correctamente',
            'photo-success'
          );
        } catch (e) {
          alert('Error al enviar');
          showNativeNotification(
            '❌ Error',
            'No se pudo enviar la foto',
            'photo-error'
          );
        } finally {
          hideUploadOverlay();
        }
      });

      document.getElementById('closeCameraBtn').addEventListener('click', () => {
        if (cam.stream) cam.stream.getTracks().forEach(t => t.stop());
        cOverlay.style.display = 'none';
        document.body.style.overflow = '';
      });

      // ==================== GALERÍA ====================
      document.getElementById('galleryBtn').addEventListener('click', () => {
        document.getElementById('realFileInput').click();
      });

      let selectedImageFile = null;
      document.getElementById('realFileInput').addEventListener('change', (e) => {
        if (!e.target.files[0]) return;
        selectedImageFile = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById('preview').src = ev.target.result;
          document.getElementById('imagePreviewModal').style.display = 'block';
        };
        reader.readAsDataURL(selectedImageFile);
      });

      document.getElementById('cancelImageBtn').addEventListener('click', () => {
        document.getElementById('imagePreviewModal').style.display = 'none';
        selectedImageFile = null;
        document.getElementById('realFileInput').value = '';
      });

      document.getElementById('sendImageBtn').addEventListener('click', async () => {
        if (!selectedImageFile) return;
        showUploadOverlay();
        try {
          const url = await uploadToCloudinary(selectedImageFile, 'image');
          const caption = document.getElementById('imageCaption').value.trim();
          const payload = {
            imageUrl: url,
            userId: user.id,
            userData: { colorIndex: user.colorIndex },
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            replyTo: replyingTo
          };
          if (caption) payload.text = caption;
          await messagesRef.push(payload);
          document.getElementById('imagePreviewModal').style.display = 'none';
          document.getElementById('imageCaption').value = '';
          selectedImageFile = null;
          if (replyingTo) {
            replyingTo = null;
            replyPreview.classList.remove('active');
          }
          
          showNativeNotification(
            '📷 Imagen enviada',
            caption || 'Tu imagen se ha enviado correctamente',
            'gallery-success'
          );
        } catch (e) {
          alert('Error al enviar imagen');
          showNativeNotification(
            '❌ Error',
            'No se pudo enviar la imagen',
            'gallery-error'
          );
        } finally {
          hideUploadOverlay();
        }
      });

      // ==================== CLOUDINARY UPLOAD ====================
      async function uploadToCloudinary(blob, type) {
        return new Promise((resolve, reject) => {
          const fd = new FormData();
          fd.append('file', blob);
          fd.append('upload_preset', 'chat_images');
          fd.append('cloud_name', 'dymmyqlfw');
          
          if (type === 'audio') fd.append('folder', 'chat-brandon-audio');
          else if (type === 'video') {
            fd.append('folder', 'chat-brandon-video');
            fd.append('resource_type', 'video');
          } else {
            fd.append('folder', 'chat-brandon-camera');
          }

          const xhr = new XMLHttpRequest();
          xhr.open('POST', 'https://api.cloudinary.com/v1_1/dymmyqlfw/upload');
          
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const percent = Math.round((e.loaded / e.total) * 100);
              updateUploadProgress(percent);
            }
          };
          
          xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              try {
                const data = JSON.parse(xhr.responseText);
                resolve(data.secure_url || data.url);
              } catch (e) {
                reject('Error parsing response');
              }
            } else {
              reject('Upload failed');
            }
          };
          
          xhr.onerror = () => reject('Network error');
          xhr.send(fd);
        });
      }

      function showUploadOverlay() {
        document.getElementById('uploadOverlay').style.display = 'flex';
        updateUploadProgress(0);
      }

      function hideUploadOverlay() {
        document.getElementById('uploadOverlay').style.display = 'none';
      }

      function updateUploadProgress(p) {
        document.getElementById('uploadBar').style.width = p + '%';
        document.getElementById('uploadPercentage').textContent = p + '%';
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (aOverlay.style.display === 'flex') {
            if (audio.stream) audio.stream.getTracks().forEach(t => t.stop());
            aOverlay.style.display = 'none';
            document.body.style.overflow = '';
            resetAudioState();
          }
          if (cOverlay.style.display === 'flex') {
            if (cam.stream) cam.stream.getTracks().forEach(t => t.stop());
            cOverlay.style.display = 'none';
            document.body.style.overflow = '';
          }
          document.getElementById('imagePreviewModal').style.display = 'none';
        }
      });

      document.getElementById('closeReplyBtn').addEventListener('click', () => {
        replyingTo = null;
        replyPreview.classList.remove('active');
      });

      chatMessages.addEventListener('scroll', () => {
        userScrolling = true;
        clearTimeout(window.scrollTimer);
        window.scrollTimer = setTimeout(() => userScrolling = false, 800);
        const distanceFromBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight;
        shouldScroll = distanceFromBottom < 150;
      }, { passive: true });

      console.log('✅ App con notificaciones nativas del sistema');
    })();
  </script>
</body>
</html>
